<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Car — Smart Garage</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080b0f; --surface: #0f1318; --surface2: #161c24; --surface3: #1d2530;
      --border: #1e2a38; --border2: #263344; --text: #e2eaf4; --muted: #5a7a9a; --muted2: #3d5870;
      --accent: #3b9eff; --warning: #f59e0b; --warning-glow: rgba(245,158,11,0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }

    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .brand { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; }
    .brand-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .brand-icon svg { width: 16px; height: 16px; color: white; }
    .brand-name span { color: var(--accent); }
    .back-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: var(--muted); text-decoration: none; padding: 6px 14px; border: 1px solid var(--border2); border-radius: 8px; background: var(--surface2); transition: all 0.15s; }
    .back-btn:hover { color: var(--text); border-color: var(--warning); }

    .page { display: flex; align-items: flex-start; justify-content: center; padding: 52px 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px; width: 100%; max-width: 480px; }
    .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .card-header h4 { font-size: 20px; font-weight: 700; }
    .car-id-badge { font-size: 11px; color: var(--muted); background: var(--surface2); padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border2); font-family: 'JetBrains Mono', monospace; }
    .card-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

    .fgroup { margin-bottom: 20px; }
    .flabel { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 7px; }
    .finput, .fselect {
      width: 100%; background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text); border-radius: 8px; font-size: 13px; font-family: 'Space Grotesk', sans-serif;
      padding: 10px 14px; transition: border-color 0.15s;
    }
    .finput:focus, .fselect:focus { outline: none; border-color: var(--warning); background: var(--surface3); }
    .fselect option { background: var(--surface2); }

    .sub-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .sub-radio { display: none; }
    .sub-card {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 16px 10px; border: 1px solid var(--border2); border-radius: 10px;
      cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .sub-card:hover { border-color: var(--muted); background: var(--surface2); }
    .sub-radio:checked + .sub-card { border-color: var(--warning); background: var(--warning-glow); }
    .sub-icon { font-size: 22px; }
    .sub-name { font-size: 12px; font-weight: 600; color: var(--text); }
    .sub-price { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
    .sub-radio:checked + .sub-card .sub-price { color: var(--warning); }

    .submit-btn {
      width: 100%; background: var(--warning); color: #080b0f; border: none;
      padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: 'Space Grotesk', sans-serif; margin-top: 10px;
      transition: opacity 0.15s;
    }
    .submit-btn:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      </div>
      <span class="brand-name">Smart<span>Garage</span></span>
    </div>
    <a href="/" class="back-btn">← Back to Dashboard</a>
  </div>

  <div class="page">
    <div class="card">
      <div class="card-header">
        <h4>Edit Car</h4>
        <span class="car-id-badge">#{{ car.id }}</span>
      </div>
      <div class="card-sub">Update the vehicle information below.</div>

      <form method="POST">
        <div class="fgroup">
          <label class="flabel">Owner Name</label>
          <input type="text" name="owner_name" class="finput" value="{{ car.owner_name }}" required>
        </div>
        <div class="fgroup">
          <label class="flabel">Car Number</label>
          <input type="text" name="car_number" class="finput" value="{{ car.car_number }}" required>
        </div>
        <div class="fgroup">
          <label class="flabel">Car Type</label>
          <select name="car_type" class="fselect" required>
            <option value="">Select type...</option>
            {% for t in car_types %}
            <option value="{{ t }}" {% if car.car_type == t %}selected{% endif %}>{{ t }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="fgroup">
          <label class="flabel">Subscription Plan</label>
          <div class="sub-grid">
            <div>
              <input type="radio" name="subscription" id="sub_hourly" value="hourly" class="sub-radio" {% if car.subscription == 'hourly' %}checked{% endif %}>
              <label for="sub_hourly" class="sub-card">
                <span class="sub-icon">⏱</span>
                <span class="sub-name">Hourly</span>
                <span class="sub-price">10 EGP/hr</span>
              </label>
            </div>
            <div>
              <input type="radio" name="subscription" id="sub_daily" value="daily" class="sub-radio" {% if car.subscription == 'daily' %}checked{% endif %}>
              <label for="sub_daily" class="sub-card">
                <span class="sub-icon">📅</span>
                <span class="sub-name">Daily</span>
                <span class="sub-price">{{ subscription_prices.daily }} EGP</span>
              </label>
            </div>
            <div>
              <input type="radio" name="subscription" id="sub_monthly" value="monthly" class="sub-radio" {% if car.subscription == 'monthly' %}checked{% endif %}>
              <label for="sub_monthly" class="sub-card">
                <span class="sub-icon">🗓</span>
                <span class="sub-name">Monthly</span>
                <span class="sub-price">{{ subscription_prices.monthly }} EGP</span>
              </label>
            </div>
          </div>
        </div>
        <button type="submit" class="submit-btn">Save Changes</button>
      </form>
    </div>
  </div>
</body>
</html>
